<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ドイツ語音階ピアノゲーム</title>
    <meta
      name="description"
      content="ドイツ語音階を見て、1オクターブのピアノ鍵盤をクリックして当てるゲームです。"
    />
    <style>
      :root {
        color-scheme: light;
        --bg-0: #fffaf2;
        --bg-1: #f4f7ff;
        --panel: rgba(255, 255, 255, 0.75);
        --panel-strong: rgba(255, 255, 255, 0.92);
        --text: #2d2a33;
        --muted: #6f6a7c;
        --accent: #ff7f6b;
        --accent-2: #6b84ff;
        --danger: #d95c70;
        --border: rgba(54, 45, 86, 0.12);
        --shadow: 0 28px 70px rgba(95, 79, 126, 0.14);
        --white-key: #fffdf9;
        --white-key-active: #ffe7dc;
        --black-key: #2f3447;
        --black-key-active: #6b84ff;
        --splash-bg: rgba(255, 250, 242, 0.94);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(255, 127, 107, 0.18), transparent 24%),
          radial-gradient(circle at 80% 12%, rgba(107, 132, 255, 0.18), transparent 24%),
          radial-gradient(circle at bottom right, rgba(255, 208, 114, 0.22), transparent 30%),
          linear-gradient(180deg, var(--bg-0), var(--bg-1));
        display: grid;
        place-items: center;
        padding: 24px;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(107, 132, 255, 0.06) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 127, 107, 0.05) 1px, transparent 1px);
        background-size: 60px 60px;
        opacity: 0.35;
        mask-image: radial-gradient(circle at center, black 45%, transparent 92%);
      }

      main {
        width: min(100%, 1100px);
        position: relative;
        background: linear-gradient(180deg, var(--panel-strong), var(--panel));
        border: 1px solid var(--border);
        border-radius: 30px;
        padding: clamp(20px, 4vw, 36px);
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
        overflow: hidden;
      }

      .splash {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(255, 127, 107, 0.18), transparent 26%),
          radial-gradient(circle at 80% 15%, rgba(107, 132, 255, 0.18), transparent 28%),
          linear-gradient(180deg, rgba(255, 252, 248, 0.98), var(--splash-bg));
        transition: opacity 420ms ease, visibility 420ms ease;
      }

      .splash.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .splash-card {
        width: 100%;
        padding: 0;
      }

      .splash-stage {
        position: relative;
        overflow: hidden;
        border-radius: 0;
        border: 1px solid rgba(101, 68, 41, 0.16);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.65), rgba(255, 248, 241, 0.92));
        box-shadow:
          0 18px 42px rgba(95, 79, 126, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.8);
      }

      .splash-keyboard-wrap {
        padding: 0;
      }

      .splash-keyboard {
        position: relative;
        width: 1500px;
        height: 210px;
        transform-origin: top left;
        border-radius: 0;
        background:
          linear-gradient(180deg, rgba(89, 59, 33, 0.96), rgba(62, 39, 24, 0.98));
        border: 1px solid rgba(255, 230, 200, 0.22);
        box-shadow:
          inset 0 2px 0 rgba(255, 255, 255, 0.1),
          inset 0 -10px 30px rgba(0, 0, 0, 0.22);
        overflow: hidden;
      }

      .splash-note-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .fall-block {
        position: absolute;
        top: -28px;
        width: 60px;
        height: 180px;
        border-radius: 0;
        background: linear-gradient(180deg, rgba(255, 183, 82, 0.92), rgba(255, 127, 107, 0.92));
        box-shadow:
          0 0 18px rgba(255, 183, 82, 0.45),
          0 0 30px rgba(255, 127, 107, 0.18);
        opacity: 0;
      }

      .fall-block.hit {
        box-shadow:
          0 0 18px rgba(255, 233, 163, 0.82),
          0 0 34px rgba(255, 183, 82, 0.58),
          inset 0 0 10px rgba(255, 255, 255, 0.55);
        filter: brightness(1.12);
      }

      .splash-keyboard .white-key,
      .splash-keyboard .black-key {
        pointer-events: none;
      }

      .splash-keyboard .white-key.hit {
        box-shadow:
          inset 0 0 0 2px rgba(255, 195, 132, 0.6),
          0 0 18px rgba(255, 183, 82, 0.6),
          inset 0 1px 0 rgba(255, 255, 255, 0.9),
          inset 0 -14px 18px rgba(156, 120, 86, 0.08),
          0 1px 0 rgba(255, 255, 255, 0.75);
        filter: brightness(1.03);
      }

      .splash-keyboard .black-key.hit {
        box-shadow:
          0 0 18px rgba(255, 183, 82, 0.45),
          0 0 28px rgba(107, 132, 255, 0.2),
          inset 0 1px 0 rgba(255, 255, 255, 0.14),
          inset 0 -8px 14px rgba(0, 0, 0, 0.18),
          0 12px 18px rgba(35, 24, 18, 0.34);
      }

      main::before,
      main::after {
        content: "";
        position: absolute;
        border-radius: 50%;
        pointer-events: none;
      }

      main::before {
        inset: -90px auto auto -90px;
        width: 220px;
        height: 220px;
        background: radial-gradient(circle, rgba(107, 132, 255, 0.18), transparent 66%);
      }

      main::after {
        inset: auto -80px -100px auto;
        width: 240px;
        height: 240px;
        background: radial-gradient(circle, rgba(255, 127, 107, 0.2), transparent 68%);
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        align-items: end;
        flex-wrap: wrap;
      }

      .title-block {
        position: relative;
        padding-left: 22px;
      }

      .title-block::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0.18em;
        bottom: 0.1em;
        width: 14px;
        border-left: 2px solid rgba(107, 88, 70, 0.55);
        border-right: 2px solid rgba(107, 88, 70, 0.18);
        background:
          linear-gradient(
            180deg,
            rgba(107, 88, 70, 0.85) 0 1px,
            transparent 1px 4px,
            rgba(107, 88, 70, 0.65) 4px 5px,
            transparent 5px 8px,
            rgba(107, 88, 70, 0.48) 8px 9px,
            transparent 9px 100%
          );
        opacity: 0.9;
      }

      .eyebrow {
        margin: 0 0 10px;
        color: rgba(107, 88, 70, 0.78);
        font: 700 0.74rem/1.2 "Georgia", "Times New Roman", serif;
        letter-spacing: 0.34em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.2rem, 5.5vw, 4.4rem);
        line-height: 0.92;
        letter-spacing: -0.02em;
        font-family:
          "M PLUS Rounded 1c",
          "Hiragino Maru Gothic ProN",
          "Yu Gothic UI",
          "Yu Gothic",
          "Noto Sans JP",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        font-style: normal;
        font-weight: 800;
        color: #3a2f29;
        text-wrap: balance;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.75);
      }

      .sub {
        margin: 14px 0 0;
        color: rgba(111, 106, 124, 0.92);
        font: 400 1.02rem/1.9 "Georgia", "Times New Roman", serif;
        max-width: 50rem;
      }

      .hud {
        display: grid;
        grid-template-columns: repeat(3, minmax(110px, 1fr));
        gap: 12px;
        min-width: min(100%, 380px);
      }

      .stat {
        border: 1px solid var(--border);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.68);
        padding: 12px 14px;
        box-shadow: 0 8px 24px rgba(95, 79, 126, 0.06);
      }

      .stat span {
        display: block;
        color: var(--muted);
        font: 600 0.74rem/1.2 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .stat strong {
        display: block;
        margin-top: 6px;
        font: 700 1.15rem/1.2 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .game {
        margin-top: 22px;
        display: grid;
        grid-template-columns: minmax(280px, 360px) 1fr;
        gap: 18px;
      }

      .card {
        border-radius: 24px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.78);
        padding: 18px;
        box-shadow: 0 10px 28px rgba(95, 79, 126, 0.06);
      }

      .target {
        min-height: 220px;
        display: grid;
        align-content: center;
        gap: 14px;
        text-align: center;
      }

      .target-label {
        margin: 0;
        color: var(--muted);
        font: 700 0.82rem/1.2 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .note {
        margin: 0;
        font-size: clamp(3rem, 11vw, 6rem);
        line-height: 0.95;
        letter-spacing: -0.08em;
        color: var(--accent);
      }

      .feedback {
        min-height: 2.2em;
        margin: 0;
        font: 700 1.05rem/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .feedback.ok {
        color: var(--accent);
      }

      .feedback.ng {
        color: var(--danger);
      }

      .buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 18px;
        justify-content: center;
      }

      button {
        appearance: none;
        border: 0;
        cursor: pointer;
        font: inherit;
      }

      .action {
        color: var(--text);
        background: linear-gradient(135deg, rgba(255, 127, 107, 0.22), rgba(107, 132, 255, 0.18));
        border: 1px solid rgba(107, 132, 255, 0.18);
        padding: 12px 18px;
        border-radius: 999px;
        font: 700 0.95rem/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        box-shadow: 0 12px 24px rgba(95, 79, 126, 0.08);
      }

      .keyboard-wrap {
        overflow-x: auto;
        padding-bottom: 4px;
        background:
          linear-gradient(180deg, rgba(101, 68, 41, 0.08), rgba(101, 68, 41, 0.02)),
          linear-gradient(180deg, rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.55));
        border: 1px solid rgba(101, 68, 41, 0.14);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.8),
          inset 0 -1px 0 rgba(101, 68, 41, 0.06);
      }

      .keyboard {
        position: relative;
        height: 270px;
        min-width: 720px;
        user-select: none;
        margin: 8px auto 0;
        padding: 14px 14px 10px;
        background:
          linear-gradient(180deg, rgba(89, 59, 33, 0.96), rgba(62, 39, 24, 0.98));
        border-radius: 22px;
        border: 1px solid rgba(255, 230, 200, 0.22);
        box-shadow:
          inset 0 2px 0 rgba(255, 255, 255, 0.1),
          inset 0 -10px 30px rgba(0, 0, 0, 0.22),
          0 18px 32px rgba(95, 79, 126, 0.12);
      }

      .white-key,
      .black-key {
        position: absolute;
        bottom: 0;
        display: flex;
        align-items: end;
        justify-content: center;
        border-radius: 0 0 12px 12px;
        transition:
          transform 90ms ease,
          background 120ms ease,
          box-shadow 120ms ease;
      }

      .white-key {
        width: 60px;
        height: calc(100% - 8px);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(246, 238, 222, 0.98));
        border: 1px solid rgba(112, 94, 71, 0.22);
        color: #3d3128;
        z-index: 1;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.9),
          inset 0 -14px 18px rgba(156, 120, 86, 0.08),
          0 1px 0 rgba(255, 255, 255, 0.75);
      }

      .black-key {
        width: 38px;
        height: 58%;
        background:
          linear-gradient(180deg, rgba(97, 78, 59, 0.98), rgba(34, 27, 33, 0.98));
        color: #f6f7fb;
        z-index: 2;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.14),
          inset 0 -8px 14px rgba(0, 0, 0, 0.18),
          0 12px 18px rgba(35, 24, 18, 0.34);
      }

      .white-key.active {
        background:
          linear-gradient(180deg, #fffaf3, var(--white-key-active));
        transform: translateY(2px);
        box-shadow:
          inset 0 0 0 2px rgba(255, 127, 107, 0.72),
          inset 0 1px 0 rgba(255, 255, 255, 0.9);
      }

      .black-key.active {
        background:
          linear-gradient(180deg, #8c6a52, #2d2730);
        transform: translateY(2px);
      }

      .white-key:focus-visible,
      .black-key:focus-visible,
      .action:focus-visible {
        outline: 3px solid rgba(255, 127, 107, 0.95);
        outline-offset: 2px;
      }

      .footer-note {
        margin: 16px 0 0;
        color: var(--muted);
        font: 400 0.96rem/1.6 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      @media (max-width: 900px) {
        .game {
          grid-template-columns: 1fr;
        }

        .target {
          min-height: 180px;
        }
      }

      @media (max-width: 640px) {
        body {
          padding: 12px;
        }

        main {
          border-radius: 22px;
        }

        .hud {
          grid-template-columns: 1fr;
          width: 100%;
        }

        .keyboard {
          min-width: 640px;
        }

        .splash-keyboard {
          width: 1330px;
        }
      }

      h1,
      .title-block,
      .eyebrow,
      .target-label,
      .feedback,
      .sub,
      .footer-note,
      .stat span,
      .stat strong {
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.3);
      }
    </style>
  </head>
  <body>
    <div class="splash" id="splash" aria-hidden="true">
      <div class="splash-card">
        <div class="splash-stage splash-keyboard-wrap">
          <div class="splash-keyboard" id="splashKeyboard"></div>
          <div class="splash-note-layer" id="splashNoteLayer"></div>
        </div>
      </div>
    </div>
    <main>
      <div class="topbar">
        <div class="title-block">
          <p class="eyebrow">German note trainer</p>
          <h1>ドイツ語音階を当てる</h1>
          <p class="sub">
            表示されたドイツ語音階に合う鍵盤をクリックしてください。正解すると次の問題に進み、合計10問まで続きます。
          </p>
        </div>
        <div class="hud" aria-label="Game status">
          <div class="stat">
            <span>Round</span>
            <strong id="roundText">1 / 10</strong>
          </div>
          <div class="stat">
            <span>Score</span>
            <strong id="scoreText">0</strong>
          </div>
          <div class="stat">
            <span>State</span>
            <strong id="stateText">Play</strong>
          </div>
        </div>
      </div>

      <section class="game">
        <div class="card target">
          <p class="target-label">Target note</p>
          <p class="note" id="targetNote" aria-live="polite">C</p>
          <p class="feedback" id="feedback" aria-live="polite">鍵盤をクリックしてください。</p>
          <div class="buttons">
            <button class="action" id="nextButton" type="button">最初からやり直す</button>
          </div>
        </div>

        <div class="card keyboard-wrap">
          <div class="keyboard" id="keyboard" aria-label="One octave piano keyboard"></div>
          <p class="footer-note">
            ドイツ語音名: C, Cis, D, Dis, E, F, Fis, G, Gis, A, Ais, H
          </p>
        </div>
      </section>
    </main>

    <script>
      const notes = [
        { german: "C", key: "C", type: "white" },
        { german: "Cis", key: "C#", type: "black" },
        { german: "D", key: "D", type: "white" },
        { german: "Dis", key: "D#", type: "black" },
        { german: "E", key: "E", type: "white" },
        { german: "F", key: "F", type: "white" },
        { german: "Fis", key: "F#", type: "black" },
        { german: "G", key: "G", type: "white" },
        { german: "Gis", key: "G#", type: "black" },
        { german: "A", key: "A", type: "white" },
        { german: "Ais", key: "A#", type: "black" },
        { german: "H", key: "B", type: "white" }
      ];

      const whiteLayout = [
        { key: "C", left: 0 },
        { key: "D", left: 60 },
        { key: "E", left: 120 },
        { key: "F", left: 180 },
        { key: "G", left: 240 },
        { key: "A", left: 300 },
        { key: "B", left: 360 }
      ];

      const blackLayout = [
        { key: "C#", left: 42 },
        { key: "D#", left: 102 },
        { key: "F#", left: 222 },
        { key: "G#", left: 282 },
        { key: "A#", left: 342 }
      ];

      const keyboard = document.getElementById("keyboard");
      const splash = document.getElementById("splash");
      const splashKeyboard = document.getElementById("splashKeyboard");
      const splashNoteLayer = document.getElementById("splashNoteLayer");
      const targetNote = document.getElementById("targetNote");
      const feedback = document.getElementById("feedback");
      const roundText = document.getElementById("roundText");
      const scoreText = document.getElementById("scoreText");
      const stateText = document.getElementById("stateText");
      const nextButton = document.getElementById("nextButton");

      let currentRound = 1;
      let score = 0;
      let finished = false;
      let target = null;

      function pickTarget() {
        return notes[Math.floor(Math.random() * notes.length)];
      }

      function updateHud() {
        roundText.textContent = `${Math.min(currentRound, 10)} / 10`;
        scoreText.textContent = String(score);
        stateText.textContent = finished ? "Done" : "Play";
      }

      function setFeedback(message, kind) {
        feedback.textContent = message;
        feedback.className = `feedback ${kind || ""}`.trim();
      }

      function clearActive() {
        const active = keyboard.querySelectorAll(".active");
        active.forEach((el) => el.classList.remove("active"));
      }

      function renderTarget() {
        target = pickTarget();
        targetNote.textContent = target.german;
        setFeedback("鍵盤をクリックしてください。", "");
        updateHud();
      }

      function finishGame() {
        finished = true;
        updateHud();
        setFeedback(`10問終了。正解数は ${score} / 10 でした。`, "ok");
      }

      function handleKeyClick(key) {
        if (finished || !target) {
          return;
        }

        clearActive();

        const button = keyboard.querySelector(`[data-key="${key}"]`);
        if (button) {
          button.classList.add("active");
        }

        const matched = key === target.key;
        if (matched) {
          score += 1;
          setFeedback(`正解: ${target.german}`, "ok");
          updateHud();

          if (currentRound >= 10) {
            finishGame();
            return;
          }

          currentRound += 1;
          window.setTimeout(() => {
            if (!finished) {
              clearActive();
              renderTarget();
            }
          }, 650);
        } else {
          setFeedback("不正解。もう一度クリックしてください。", "ng");
        }
      }

      function createKey({ key, left }) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "white-key";
        button.style.left = `${left}px`;
        button.dataset.key = key;
        button.setAttribute("aria-label", key === "B" ? "H" : key);
        button.addEventListener("click", () => handleKeyClick(key));
        keyboard.appendChild(button);
      }

      function createBlackKey({ key, left }, germanLabel) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "black-key";
        button.style.left = `${left}px`;
        button.dataset.key = key;
        button.setAttribute("aria-label", germanLabel);
        button.addEventListener("click", () => handleKeyClick(key));
        keyboard.appendChild(button);
      }

      function buildKeyboard() {
        whiteLayout.forEach(createKey);
        blackLayout.forEach((item) => {
          const note = notes.find((n) => n.key === item.key);
          createBlackKey(item, note ? note.german : item.key);
        });
      }

      function buildSplashKeyboard() {
        const splashKeys = [];
        const splashWhiteLayout = Array.from({ length: 17 }, (_, index) => ({
          left: index * 60
        }));

        splashWhiteLayout.forEach(({ left }) => {
          const keyEl = document.createElement("div");
          keyEl.className = "white-key";
          keyEl.style.left = `${left}px`;
          keyEl.dataset.left = String(left);
          keyEl.dataset.width = "60";
          keyEl.setAttribute("aria-hidden", "true");
          splashKeyboard.appendChild(keyEl);
          splashKeys.push(keyEl);
        });

        const splashBlackLayout = [
          { left: 42 },
          { left: 102 },
          { left: 222 },
          { left: 282 },
          { left: 342 },
          { left: 402 },
          { left: 522 },
          { left: 582 },
          { left: 702 },
          { left: 762 },
          { left: 822 },
          { left: 942 },
          { left: 1002 },
          { left: 1122 },
          { left: 1182 },
          { left: 1242 }
        ];

        splashBlackLayout.forEach(({ left }) => {
          const keyEl = document.createElement("div");
          keyEl.className = "black-key";
          keyEl.style.left = `${left}px`;
          keyEl.dataset.left = String(left);
          keyEl.dataset.width = "38";
          keyEl.setAttribute("aria-hidden", "true");
          splashKeyboard.appendChild(keyEl);
          splashKeys.push(keyEl);
        });

        const blocks = [];
        const keyCenters = splashWhiteLayout.map(({ left }) => left + 30);
        const blockCount = 4;
        const laneIndices = Array.from({ length: splashWhiteLayout.length }, (_, index) => index);
        for (let i = laneIndices.length - 1; i > 0; i -= 1) {
          const swapIndex = Math.floor(Math.random() * (i + 1));
          [laneIndices[i], laneIndices[swapIndex]] = [laneIndices[swapIndex], laneIndices[i]];
        }

        for (let i = 0; i < blockCount; i += 1) {
          const block = document.createElement("div");
          block.className = "fall-block";
          const lane = laneIndices[i];
          const center = keyCenters[lane];
          const duration = 0.9 + Math.random() * 0.7;
          const delay = Math.random() * -1.9;
          const blockWidth = 60;
          const left = center - blockWidth / 2;
          block.style.left = `${left}px`;
          block.style.animationDuration = `${duration}s`;
          block.style.animationDelay = `${delay}s`;
          block.style.width = `${blockWidth}px`;
          block.dataset.baseLeft = String(left);
          block.dataset.duration = String(duration);
          block.dataset.delay = String(delay);
          block.dataset.center = String(center);
          splashNoteLayer.appendChild(block);
          blocks.push(block);
        }

        const baseWidth = 720;
        const availableWidth = Math.max(
          320,
          window.innerWidth - 2 * Math.max(0, parseFloat(getComputedStyle(document.body).paddingLeft) || 24)
        );
        const scale = Math.min(1.35, availableWidth / baseWidth);
          splashKeyboard.style.transform = `scale(${scale})`;
        splashKeyboard.parentElement.style.height = `${Math.round(210 * scale)}px`;

        const windowMs = 3000;
        const start = performance.now();

        function frame(now) {
          const elapsed = now - start;
          const progress = elapsed / 1000;
          const activeY = 150;
          splashKeys.forEach((keyEl) => keyEl.classList.remove("hit"));

          blocks.forEach((block, index) => {
            const duration = Number(block.dataset.duration);
            const delay = Number(block.dataset.delay);
            const local = (progress + delay + index * 0.06) % duration;
            const ratio = local / duration;
            const x = Number(block.dataset.baseLeft);
            const center = Number(block.dataset.center);
            const y = -28 + ratio * 240;
            const opacity = Math.min(1, Math.max(0, ratio * 1.2));
            block.style.transform = `translateY(${y}px)`;
            block.style.opacity = String(opacity);
            const aligned = y >= activeY && y <= activeY + 30;
            block.classList.toggle("hit", aligned);

            const activeKeys = splashKeys.filter((keyEl) => {
              const keyLeft = Number(keyEl.dataset.left);
              const keyWidth = Number(keyEl.dataset.width);
              return center >= keyLeft && center <= keyLeft + keyWidth;
            });

            if (aligned) {
              activeKeys.forEach((keyEl) => keyEl.classList.add("hit"));
            }
          });

          if (elapsed < windowMs) {
            requestAnimationFrame(frame);
          } else {
            splash.classList.add("hidden");
          }
        }

        requestAnimationFrame(frame);
      }

      nextButton.addEventListener("click", () => {
        score = 0;
        currentRound = 1;
        finished = false;
        clearActive();
        renderTarget();
      });

      buildKeyboard();
      buildSplashKeyboard();
      renderTarget();
    </script>
  </body>
</html>
