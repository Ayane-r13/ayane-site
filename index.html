<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ayane Site</title>
    <meta
      name="description"
      content="Ayane のシンプルでおしゃれな GitHub Pages サイトです。"
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #f3efe8;
        --bg-2: #e7dfd4;
        --panel: rgba(255, 251, 245, 0.8);
        --panel-strong: rgba(255, 255, 255, 0.92);
        --text: #171412;
        --muted: #655d55;
        --accent: #b86b3f;
        --accent-2: #395b5a;
        --border: rgba(23, 20, 18, 0.1);
        --shadow: 0 30px 90px rgba(52, 33, 17, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua",
          Georgia, serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(184, 107, 63, 0.18), transparent 34%),
          radial-gradient(circle at top right, rgba(57, 91, 90, 0.18), transparent 28%),
          linear-gradient(180deg, #faf7f2 0%, var(--bg) 40%, var(--bg-2) 100%);
        display: grid;
        place-items: center;
        padding: 28px;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.18) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.18) 1px, transparent 1px);
        background-size: 64px 64px;
        mask-image: radial-gradient(circle at center, black 42%, transparent 92%);
        opacity: 0.25;
      }

      main {
        width: min(100%, 820px);
        position: relative;
        background: linear-gradient(180deg, var(--panel-strong), var(--panel));
        border: 1px solid var(--border);
        border-radius: 32px;
        padding: clamp(28px, 5vw, 56px);
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
        isolation: isolate;
      }

      main::after {
        content: "";
        position: absolute;
        inset: 16px;
        border-radius: 22px;
        border: 1px solid rgba(255, 255, 255, 0.45);
        pointer-events: none;
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--accent-2);
        font: 700 0.78rem/1.2 system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        letter-spacing: 0.24em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        max-width: 10ch;
        font-size: clamp(2.6rem, 8vw, 5.4rem);
        line-height: 0.95;
        letter-spacing: -0.05em;
      }

      .lead {
        margin: 20px 0 0;
        max-width: 42rem;
        color: var(--muted);
        font: 400 clamp(1rem, 2vw, 1.14rem)/1.9 system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        margin-top: 34px;
      }

      a {
        color: var(--text);
        text-decoration: none;
        border: 1px solid rgba(23, 20, 18, 0.12);
        background: rgba(255, 255, 255, 0.7);
        padding: 12px 18px;
        border-radius: 999px;
        font: 600 0.95rem/1 system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        letter-spacing: 0.02em;
        transition:
          transform 180ms ease,
          border-color 180ms ease,
          background 180ms ease,
          box-shadow 180ms ease;
      }

      a:hover {
        transform: translateY(-2px);
        border-color: rgba(184, 107, 63, 0.35);
        background: rgba(255, 255, 255, 0.95);
        box-shadow: 0 10px 24px rgba(184, 107, 63, 0.15);
      }

      .accent {
        color: var(--accent);
      }

      .rule {
        width: 84px;
        height: 2px;
        margin: 28px 0;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--accent), transparent);
      }

      .meta {
        margin-top: 30px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 14px;
      }

      .card {
        padding: 16px 18px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.56);
        border: 1px solid rgba(23, 20, 18, 0.08);
      }

      .card strong {
        display: block;
        margin-bottom: 6px;
        font: 700 0.88rem/1.2 system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--accent-2);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .card span {
        display: block;
        color: var(--muted);
        font: 400 0.98rem/1.6 system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      @media (max-width: 640px) {
        body {
          padding: 16px;
        }

        main {
          border-radius: 24px;
        }

        main::after {
          inset: 10px;
        }

        .links {
          flex-direction: column;
        }

        a {
          width: 100%;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">GitHub Pages</p>
      <h1>Ayane の<br /><span class="accent">Web サイト</span></h1>
      <div class="rule" aria-hidden="true"></div>
      <p class="lead">
        このページは、GitHub Pages で公開するためのシンプルなトップページです。
        必要に応じて、プロフィールやリンク、作品紹介をここに追加できます。
      </p>
      <div class="links">
        <a href="/" rel="noreferrer">Open Site</a>
        <a href="https://github.com/Ayane-r13/ayane-site" rel="noreferrer"
          >GitHub Repo</a
        >
      </div>
      <section class="meta" aria-label="Site notes">
        <div class="card">
          <strong>About</strong>
          <span>やわらかい色合いと余白で、落ち着いた印象にしています。</span>
        </div>
        <div class="card">
          <strong>Update</strong>
          <span>この部分は、あとから作品紹介や SNS への導線に差し替えできます。</span>
        </div>
      </section>
    </main>
  </body>
</html>
